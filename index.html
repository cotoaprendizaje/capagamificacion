/* Drag & drop: clasificar cosmética vs cognitiva */
const DND_ITEMS=[
  {id:1,text:"Cada slide muestra un trofeo cuando hacés click en \"siguiente\"",cat:"cos"},
  {id:2,text:"El curso muestra un caso, pedís decidir y según la elección abre un escenario distinto con feedback",cat:"cog"},
  {id:3,text:"Ranking público de quién terminó el módulo más rápido",cat:"cos"},
  {id:4,text:"Después de cada bloque de contenido, tres preguntas de recuperación que tenés que aprobar para seguir",cat:"cog"},
  {id:5,text:"Una mecánica de \"vidas\": si no acertás en pocos intentos, el módulo te devuelve al contenido a repasar el punto débil",cat:"cog"},
  {id:6,text:"Una barra de XP que sube cada vez que entrás al curso, sin importar si aprendiste algo",cat:"cos"}
];

function initDnD(){
  const block=app.querySelector('[data-interactive="dnd"]');
  if(!block) return;
  const pool=block.querySelector('#dnd-pool');
  const zones=block.querySelectorAll('.dnd-zone');
  const feedback=block.querySelector('#dnd-feedback');

  /* Mezclar y renderizar items */
  const shuffled=[...DND_ITEMS].sort(()=>Math.random()-0.5);
  shuffled.forEach(item=>{
    const el=document.createElement('div');
    el.className='dnd-item';
    el.draggable=true;
    el.dataset.id=item.id;
    el.dataset.cat=item.cat;
    el.textContent=item.text;
    pool.appendChild(el);
  });

  let dragged=null;
  const items=block.querySelectorAll('.dnd-item');

  items.forEach(it=>{
    it.addEventListener('dragstart',e=>{
      dragged=it;
      it.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',it.dataset.id);
    });
    it.addEventListener('dragend',()=>{
      it.classList.remove('dragging');
      dragged=null;
    });
  });

  /* Soporte touch básico */
  items.forEach(it=>{
    let touchClone=null,startX=0,startY=0,offsetX=0,offsetY=0;
    it.addEventListener('touchstart',e=>{
      const t=e.touches[0];
      const r=it.getBoundingClientRect();
      startX=t.clientX;startY=t.clientY;
      offsetX=t.clientX-r.left;offsetY=t.clientY-r.top;
      dragged=it;
      it.classList.add('dragging');
    },{passive:true});
    it.addEventListener('touchmove',e=>{
      if(!dragged) return;
      e.preventDefault();
      const t=e.touches[0];
      if(!touchClone){
        touchClone=it.cloneNode(true);
        touchClone.style.position='fixed';
        touchClone.style.zIndex='9999';
        touchClone.style.pointerEvents='none';
        touchClone.style.width=it.offsetWidth+'px';
        touchClone.style.opacity='.85';
        document.body.appendChild(touchClone);
      }
      touchClone.style.left=(t.clientX-offsetX)+'px';
      touchClone.style.top=(t.clientY-offsetY)+'px';
      /* highlight zona */
      zones.forEach(z=>z.classList.remove('dragover'));
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const z=el?el.closest('.dnd-zone'):null;
      if(z) z.classList.add('dragover');
    },{passive:false});
    it.addEventListener('touchend',e=>{
      if(!dragged) return;
      const t=e.changedTouches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const z=el?el.closest('.dnd-zone'):null;
      zones.forEach(zn=>zn.classList.remove('dragover'));
      if(touchClone){ touchClone.remove(); touchClone=null; }
      it.classList.remove('dragging');
      if(z) dropItem(it,z);
      dragged=null;
    });
  });

  zones.forEach(z=>{
    z.addEventListener('dragover',e=>{
      e.preventDefault();
      z.classList.add('dragover');
    });
    z.addEventListener('dragleave',()=>z.classList.remove('dragover'));
    z.addEventListener('drop',e=>{
      e.preventDefault();
      z.classList.remove('dragover');
      if(!dragged) return;
      dropItem(dragged,z);
    });
  });

  function dropItem(item,zone){
    const correct=item.dataset.cat===zone.dataset.zone;
    if(correct){
      item.classList.remove('incorrect');
      item.classList.add('correct');
      item.draggable=false;
      zone.appendChild(item);
    } else {
      item.classList.add('incorrect');
      setTimeout(()=>item.classList.remove('incorrect'),600);
    }
    updateFeedback();
  }

  function updateFeedback(){
    const total=DND_ITEMS.length;
    const correct=block.querySelectorAll('.dnd-item.correct').length;
    if(correct===total){
      feedback.textContent='¡Listo! Los seis están bien clasificados.';
      feedback.classList.add('done');
      if(!block.querySelector('.dnd-reset')){
        const btn=document.createElement('button');
        btn.className='dnd-reset';
        btn.type='button';
        btn.textContent='Reintentar';
        btn.addEventListener('click',()=>{
          block.querySelector('.dnd-wrap').remove();
          feedback.classList.remove('done');
          feedback.textContent='Arrastrá los seis ítems para empezar.';
          btn.remove();
          /* rebuild */
          const wrap=document.createElement('div');
          wrap.className='dnd-wrap';
          wrap.innerHTML=`<div><p class="dnd-pool-label">Ejemplos por clasificar</p><div class="dnd-pool" id="dnd-pool"></div></div><div class="dnd-zones"><div class="dnd-zone cos" data-zone="cos"><p class="dnd-zone-title">Cosmética</p></div><div class="dnd-zone cog" data-zone="cog"><p class="dnd-zone-title">Cognitiva</p></div></div>`;
          feedback.parentNode.insertBefore(wrap,feedback);
          initDnD();
        });
        feedback.parentNode.insertBefore(btn,feedback.nextSibling);
      }
    } else {
      feedback.textContent=`Llevás ${correct} de ${total} bien clasificados.`;
    }
  }
}

/* Quiz bloqueante */
function initQuiz(dayN,questions){
  const container=app.querySelector('#quiz-d1');
  if(!container) return;
  const submitBtn=app.querySelector('#quiz-submit');
  const retryBtn=app.querySelector('#quiz-retry');
  const result=app.querySelector('#quiz-result');
  const gate=app.querySelector('#quiz-gate');

  const passed=quizPassed(dayN);

  container.innerHTML=questions.map((q,i)=>`
    <div class="quiz-q" data-q="${i}">
      <p class="quiz-q-text"><span class="quiz-q-num">${i+1}</span>${q.q}</p>
      <div class="quiz-options">
        ${q.opts.map((o,j)=>`
          <label class="quiz-opt" data-opt="${j}">
            <input type="radio" name="q${i}" value="${j}">
            <span>${o}</span>
          </label>
        `).join("")}
      </div>
      <div class="quiz-feedback" id="qfb-${i}"></div>
    </div>
  `).join("");

  /* Marcar selección visualmente */
  container.querySelectorAll('.quiz-opt').forEach(opt=>{
    opt.addEventListener('click',e=>{
      const q=opt.closest('.quiz-q');
      q.querySelectorAll('.quiz-opt').forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected');
    });
  });

  if(passed){
    showResults(true);
  }

  submitBtn.addEventListener('click',()=>{
    let score=0;
    questions.forEach((q,i)=>{
      const sel=container.querySelector(`input[name="q${i}"]:checked`);
      const opts=container.querySelectorAll(`.quiz-q[data-q="${i}"] .quiz-opt`);
      const fb=container.querySelector(`#qfb-${i}`);
      opts.forEach(o=>o.classList.add('disabled'));
      if(!sel){
        fb.textContent='Sin respuesta. La correcta es: «'+q.opts[q.correct]+'». '+q.explain;
        fb.className='quiz-feedback bad show';
        opts[q.correct].classList.add('correct');
        return;
      }
      const picked=parseInt(sel.value,10);
      if(picked===q.correct){
        score++;
        opts[picked].classList.add('correct');
        fb.textContent='Correcto. '+q.explain;
        fb.className='quiz-feedback ok show';
      } else {
        opts[picked].classList.add('incorrect');
        opts[q.correct].classList.add('correct');
        fb.textContent='La correcta es: «'+q.opts[q.correct]+'». '+q.explain;
        fb.className='quiz-feedback bad show';
      }
    });
    const total=questions.length;
    const pass=score>=3;
    result.textContent=`${score} / ${total} respuestas correctas${pass?' — aprobado':''}`;
    result.className='quiz-result '+(pass?'pass':'fail');
    submitBtn.style.display='none';
    retryBtn.style.display='';
    if(pass){
      markQuizPassed(dayN);
      gate.innerHTML='<strong>¡Aprobado!</strong> Ya podés marcar el día como completado abajo.';
      gate.style.background='var(--green-soft)';
      gate.style.borderColor='var(--green)';
      /* Re-render para habilitar el botón */
      setTimeout(()=>{
        const btnComplete=app.querySelector('.daynav .btn[disabled]');
        if(btnComplete && btnComplete.textContent.includes('Marcar')){
          const newBtn=document.createElement('button');
          newBtn.className='btn btn-primary';
          newBtn.textContent='Marcar como completado';
          newBtn.dataset.complete=dayN;
          newBtn.addEventListener('click',()=>{
            state.completed.add(dayN); saveProgress(); updateTopbar(); renderDay(dayN);
          });
          btnComplete.replaceWith(newBtn);
        }
      },400);
    }
  });

  retryBtn.addEventListener('click',()=>{
    /* Reset */
    container.querySelectorAll('.quiz-opt').forEach(o=>{
      o.classList.remove('selected','correct','incorrect','disabled');
      const inp=o.querySelector('input'); if(inp) inp.checked=false;
    });
    container.querySelectorAll('.quiz-feedback').forEach(f=>{
      f.className='quiz-feedback';
      f.textContent='';
    });
    result.textContent='';
    result.className='quiz-result';
    submitBtn.style.display='';
    retryBtn.style.display='none';
  });

  function showResults(asPassed){
    /* Modo solo-lectura: mostrar correctas sin tocar nada */
    if(!asPassed) return;
    result.textContent='Quiz aprobado. Podés reintentar para repasar.';
    result.className='quiz-result pass';
    gate.innerHTML='<strong>Quiz aprobado.</strong> El botón de completar el día está habilitado abajo.';
    gate.style.background='var(--green-soft)';
    gate.style.borderColor='var(--green)';
  }
}
